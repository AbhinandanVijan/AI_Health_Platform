name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/Api/**'
      - 'src/OcrWorker/**'
      - 'docker-compose.aws.yml'
      - 'deploy/nginx/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_PATH="${{ vars.EC2_APP_PATH }}"
            if [ -z "$APP_PATH" ]; then
              APP_PATH="$HOME/AI_Health_Platform"
            fi

            cd "$APP_PATH"

            git fetch --all
            git checkout main
            git pull origin main

            docker compose --env-file .env.aws -f docker-compose.aws.yml up -d --build
            docker compose --env-file .env.aws -f docker-compose.aws.yml ps

            curl -fsS http://localhost/health > /dev/null
            echo "Backend deploy completed and health check passed."
