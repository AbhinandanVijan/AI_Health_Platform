name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/Api/**'
      - 'src/OcrWorker/**'
      - 'docker-compose.aws.yml'
      - 'deploy/nginx/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing secret: EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing secret: EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing secret: EC2_SSH_KEY" && exit 1)

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2 over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_PATH: ${{ vars.EC2_APP_PATH }}
        run: |
          set -euo pipefail

          APP_PATH="$EC2_APP_PATH"
          if [ -z "$APP_PATH" ]; then
            APP_PATH='~/AI_Health_Platform'
          fi

          ssh -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            cd '$APP_PATH'
            git fetch --all
            git checkout main
            git pull origin main
            docker compose --env-file .env.aws -f docker-compose.aws.yml up -d --build
            docker compose --env-file .env.aws -f docker-compose.aws.yml ps
            curl -fsS http://localhost/health > /dev/null
            echo Backend deploy completed and health check passed.
          "
