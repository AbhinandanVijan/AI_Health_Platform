name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/Api/**'
      - 'src/OcrWorker/**'
      - 'docker-compose.aws.yml'
      - 'deploy/nginx/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Validate required repository variables
        run: |
          test -n "${{ vars.EC2_HOST || vars.EC2_PUBLIC_HOST }}" || (echo "Missing var: EC2_HOST (or EC2_PUBLIC_HOST)" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing secret: EC2_SSH_KEY" && exit 1)

      - name: Ensure required tools are available
        run: |
          set -euo pipefail
          if ! command -v ssh >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y openssh-client
          fi

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Validate host format
        env:
          EC2_HOST: ${{ vars.EC2_HOST || vars.EC2_PUBLIC_HOST }}
        run: |
          set -euo pipefail
          case "$EC2_HOST" in
            http://*|https://*)
              echo "EC2_HOST must be a hostname or IP only (no scheme)."
              exit 1
              ;;
          esac

      - name: Add target host key
        env:
          EC2_HOST: ${{ vars.EC2_HOST || vars.EC2_PUBLIC_HOST }}
        run: |
          set -euo pipefail
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts || true

      - name: Network preflight for SSH
        env:
          EC2_HOST: ${{ vars.EC2_HOST || vars.EC2_PUBLIC_HOST }}
        run: |
          set -euo pipefail
          if ! nc -zvw5 "$EC2_HOST" 22; then
            echo "Port 22 is unreachable from this runner."
            echo "Allow inbound SSH from GitHub-hosted runners or use a self-hosted runner on EC2."
            exit 1
          fi

      - name: Deploy on EC2 over SSH
        env:
          EC2_HOST: ${{ vars.EC2_HOST || vars.EC2_PUBLIC_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          EC2_APP_PATH: ${{ vars.EC2_APP_PATH }}
        run: |
          set -euo pipefail

          USER_NAME="$EC2_USER"
          if [ -z "$USER_NAME" ]; then
            USER_NAME='ec2-user'
          fi

          APP_PATH="$EC2_APP_PATH"
          if [ -z "$APP_PATH" ]; then
            APP_PATH='/home/ec2-user/AI_Health_Platform'
          fi

          REMOTE_TARGET="$USER_NAME@$EC2_HOST"

          SSH_OPTS="-i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"

          ssh $SSH_OPTS "$REMOTE_TARGET" "echo SSH connection established"

          ssh $SSH_OPTS "$REMOTE_TARGET" "
            set -euo pipefail
            cd '$APP_PATH'
            git fetch --all
            git checkout main
            git pull origin main
            docker compose --env-file .env.aws -f docker-compose.aws.yml up -d --build
            docker compose --env-file .env.aws -f docker-compose.aws.yml ps
            curl -fsS http://localhost/health > /dev/null
            echo Backend deploy completed and health check passed.
          "
