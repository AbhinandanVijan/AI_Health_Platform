name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required repository variables
        run: |
          test -n "${{ vars.AWS_OIDC_ROLE_ARN }}" || (echo "Missing var: AWS_OIDC_ROLE_ARN" && exit 1)
          test -n "${{ vars.AWS_REGION }}" || (echo "Missing var: AWS_REGION" && exit 1)
          test -n "${{ vars.FRONTEND_BUCKET }}" || (echo "Missing var: FRONTEND_BUCKET" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync frontend build to S3
        run: |
          aws s3 sync frontend/dist/frontend/browser s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Show recently uploaded files
        run: |
          aws s3 ls s3://${{ vars.FRONTEND_BUCKET }} --recursive | tail -n 10
