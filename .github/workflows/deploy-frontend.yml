name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Validate required repository variables
        run: |
          test -n "${{ vars.AWS_OIDC_ROLE_ARN }}" || (echo "Missing var: AWS_OIDC_ROLE_ARN" && exit 1)
          test -n "${{ vars.AWS_REGION }}" || (echo "Missing var: AWS_REGION" && exit 1)
          test -n "${{ vars.FRONTEND_BUCKET }}" || (echo "Missing var: FRONTEND_BUCKET" && exit 1)

      - name: Checkout repository without marketplace action
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO_DIR="$RUNNER_TEMP/repo"
          rm -rf "$REPO_DIR"
          mkdir -p "$REPO_DIR"
          cd "$REPO_DIR"

          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" fetch --depth 1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

          echo "REPO_DIR=$REPO_DIR" >> "$GITHUB_ENV"

      - name: Ensure required tools are available
        run: |
          set -euo pipefail
          command -v node >/dev/null || (echo "Node.js is required on runner" && exit 1)
          command -v npm >/dev/null || (echo "npm is required on runner" && exit 1)
          command -v python3 >/dev/null || (echo "python3 is required on runner" && exit 1)
          if ! command -v aws >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

      - name: Install and build frontend
        run: |
          set -euo pipefail
          cd "$REPO_DIR/frontend"
          npm ci
          npm run build

      - name: Assume AWS role via OIDC
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
        run: |
          set -euo pipefail

          OIDC_TOKEN=$(curl -sSf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')

          CREDS_JSON=$(aws sts assume-role-with-web-identity \
            --role-arn "$AWS_OIDC_ROLE_ARN" \
            --role-session-name "gha-frontend-deploy" \
            --web-identity-token "$OIDC_TOKEN" \
            --duration-seconds 3600 \
            --region "$AWS_REGION")

          AWS_ACCESS_KEY_ID=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["Credentials"]["AccessKeyId"])' <<< "$CREDS_JSON")
          AWS_SECRET_ACCESS_KEY=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["Credentials"]["SecretAccessKey"])' <<< "$CREDS_JSON")
          AWS_SESSION_TOKEN=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["Credentials"]["SessionToken"])' <<< "$CREDS_JSON")

          {
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN"
            echo "AWS_REGION=$AWS_REGION"
          } >> "$GITHUB_ENV"

      - name: Sync frontend build to S3
        run: |
          set -euo pipefail
          aws s3 sync "$REPO_DIR/frontend/dist/frontend/browser" s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Show recently uploaded files
        run: |
          aws s3 ls s3://${{ vars.FRONTEND_BUCKET }} --recursive | tail -n 10
